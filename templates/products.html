<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>Results — Amazon Price Comparator</title>
</head>
<body class="bg-light">

    <!-- Navbar with search -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Amazon Price Comparator</a>
            <form class="d-flex gap-2 ms-auto" action="/products" method="GET">
                <input name="q" type="text" class="form-control" placeholder="Search products..." value="{{ query }}" required>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
    </nav>

    <!-- Loading spinner (shown initially) -->
    <div id="loading" class="d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
        <h4 class="mb-3 text-secondary">Scraping data, please wait…</h4>
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Error message (hidden initially) -->
    <div id="error" class="container d-none">
        <div class="alert alert-danger text-center" role="alert">
            Something went wrong. <a href="/" class="alert-link">Go back and try again.</a>
        </div>
    </div>

    <!-- No results message (hidden initially) -->
    <div id="no-results" class="container d-none">
        <div class="alert alert-warning text-center" role="alert">
            No products found for "<strong>{{ query }}</strong>". <a href="/" class="alert-link">Try a different search.</a>
        </div>
    </div>

    <!-- Product results (hidden initially) -->
    <div id="results" class="container d-none">
        <h5 class="mb-3 text-muted">Results for "<strong>{{ query }}</strong>"</h5>
        <div id="product-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Cards injected here by JS -->
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const query = "{{ query }}";
            if (!query) {
                window.location.href = "/";
                return;
            }

            fetch(`/api/search?q=${encodeURIComponent(query)}`)
                .then(res => {
                    if (!res.ok) throw new Error("Network error");
                    return res.json();
                })
                .then(products => {
                    // Handle case where response is a JSON string instead of parsed array
                    if (typeof products === "string") {
                        products = JSON.parse(products);
                    }
                    document.getElementById("loading").classList.add("d-none");

                    if (!products || products.length === 0) {
                        document.getElementById("no-results").classList.remove("d-none");
                        return;
                    }

                    const grid = document.getElementById("product-grid");

                    products.forEach(p => {
                        const priceBtn = (label, price, link) => {
                            if (!price || price === "None") {
                                return `<span class="btn btn-outline-secondary btn-sm disabled w-100">${label}: N/A</span>`;
                            }
                            return `<a href="${link}" target="_blank" class="btn btn-outline-primary btn-sm w-100">${label}: €${price}</a>`;
                        };

                        const col = document.createElement("div");
                        col.className = "col";
                        col.innerHTML = `
                            <div class="card h-100 shadow-sm">
                                <img src="${p.image}" class="card-img-top p-3" alt="${p.title}" style="height:220px; object-fit:contain; background:#fff;">
                                <div class="card-body d-flex flex-column">
                                    <h6 class="card-title" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${p.title}</h6>
                                    <div class="mt-auto d-grid gap-2 pt-3">
                                        ${priceBtn("Amazon.ie", p.price_ie, p.link_ie)}
                                        ${priceBtn("Amazon.de", p.price_de, p.link_de)}
                                        ${priceBtn("Amazon.co.uk", p.price_uk, p.link_uk)}
                                    </div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(col);
                    });

                    document.getElementById("results").classList.remove("d-none");
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("loading").classList.add("d-none");
                    document.getElementById("error").classList.remove("d-none");
                });
        });
    </script>

</body>
</html>
