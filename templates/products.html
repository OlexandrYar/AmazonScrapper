<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>Results — Amazon Price Comparator</title>
</head>
<body class="bg-light">

    <!-- Navbar with search -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Amazon Price Comparator</a>
            <form class="d-flex gap-2 ms-auto" action="/products" method="GET">
                <input name="q" type="text" class="form-control" placeholder="Search products..." value="{{ query }}" required>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
    </nav>

    <!-- Loading spinner (shown initially) -->
    <div id="loading" class="d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
        <h4 class="mb-3 text-secondary">Scraping data, please wait…</h4>
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Error message (hidden initially) -->
    <div id="error" class="container d-none">
        <div class="alert alert-danger text-center" role="alert">
            Something went wrong. <a href="/" class="alert-link">Go back and try again.</a>
        </div>
    </div>

    <!-- No results message (hidden initially) -->
    <div id="no-results" class="container d-none">
        <div class="alert alert-warning text-center" role="alert">
            No products found for "<strong>{{ query }}</strong>". <a href="/" class="alert-link">Try a different search.</a>
        </div>
    </div>

    <!-- Product results (hidden initially) -->
    <div id="results" class="container d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="text-muted mb-0">Results for "<strong>{{ query }}</strong>"</h5>
            <button id="download-csv" class="btn btn-success btn-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-download me-1" viewBox="0 0 16 16">
                    <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
                    <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
                </svg>
                Download CSV
            </button>
        </div>
        <div id="product-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Cards injected here by JS -->
        </div>
    </div>

    <script>
        let allProducts = [];

        function downloadCSV() {
            if (!allProducts.length) return;
            const headers = ["Title", "Price IE (€)", "Price DE (€)", "Price UK (€)", "Link IE", "Link DE", "Link UK", "ASIN"];
            const escape = (val) => `"${String(val ?? "N/A").replace(/"/g, '""')}"`;
            const rows = allProducts.map(p => [
                escape(p.title),
                escape(p.price_ie !== "None" ? p.price_ie : "N/A"),
                escape(p.price_de !== "None" ? p.price_de : "N/A"),
                escape(p.price_uk !== "None" ? p.price_uk : "N/A"),
                escape(p.link_ie),
                escape(p.link_de),
                escape(p.link_uk),
                escape(p.asin)
            ].join(","));
            const csv = [headers.join(","), ...rows].join("\n");
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `products_${encodeURIComponent("{{ query }}")}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const query = "{{ query }}";
            if (!query) {
                window.location.href = "/";
                return;
            }

            document.getElementById("download-csv").addEventListener("click", downloadCSV);

            fetch(`/api/search?q=${encodeURIComponent(query)}`)
                .then(res => {
                    if (!res.ok) throw new Error("Network error");
                    return res.json();
                })
                .then(products => {
                    // Handle case where response is a JSON string instead of parsed array
                    if (typeof products === "string") {
                        products = JSON.parse(products);
                    }
                    allProducts = products;
                    document.getElementById("loading").classList.add("d-none");

                    if (!products || products.length === 0) {
                        document.getElementById("no-results").classList.remove("d-none");
                        return;
                    }

                    const grid = document.getElementById("product-grid");

                    products.forEach(p => {
                        const priceBtn = (label, price, link) => {
                            if (!price || price === "None") {
                                return `<span class="btn btn-outline-secondary btn-sm disabled w-100">${label}: N/A</span>`;
                            }
                            return `<a href="${link}" target="_blank" class="btn btn-outline-primary btn-sm w-100">${label}: €${price}</a>`;
                        };

                        const col = document.createElement("div");
                        col.className = "col";
                        col.innerHTML = `
                            <div class="card h-100 shadow-sm">
                                <img src="${p.image}" class="card-img-top p-3" alt="${p.title}" style="height:220px; object-fit:contain; background:#fff;">
                                <div class="card-body d-flex flex-column">
                                    <h6 class="card-title" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${p.title}</h6>
                                    <div class="mt-auto d-grid gap-2 pt-3">
                                        ${priceBtn("Amazon.ie", p.price_ie, p.link_ie)}
                                        ${priceBtn("Amazon.de", p.price_de, p.link_de)}
                                        ${priceBtn("Amazon.co.uk", p.price_uk, p.link_uk)}
                                    </div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(col);
                    });

                    document.getElementById("results").classList.remove("d-none");
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("loading").classList.add("d-none");
                    document.getElementById("error").classList.remove("d-none");
                });
        });
    </script>

</body>
</html>
