<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>Amazon Price Comparator</title>
</head>
<body>
    <div class="d-flex align-items-center m-auto">
        <div class="position-absolute top-50 start-50 translate-middle text-center">
            <h1 class="mb-4">Amazon Price Comparator</h1>

            <form class="d-flex gap-3" action="/products" method="GET">
                <input id="searchRequest" name="q" type="text" class="form-control" placeholder="Desired product" required>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
    </div>
</body>
</html>
